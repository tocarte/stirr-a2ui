<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STIRR Discover</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  :root {
    --stirr-red: #E8392A;
    --stirr-yellow: #ffda3a;
    --bg-dark: #0d0d1a;
    --card-bg: #1a1a2e;
    --card-hover: #252545;
    --text-primary: #ffffff;
    --text-secondary: #a0a0b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-dark); color: var(--text-primary); font-family: system-ui, -apple-system, sans-serif; padding: 20px; min-height: 100vh; }

  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .header-logo { background: var(--stirr-red); color: #fff; font-weight: 900; font-size: 22px; padding: 8px 18px; border-radius: 10px; letter-spacing: 1.5px; box-shadow: 0 2px 12px rgba(232,57,42,0.4); }
  .header-title { font-size: 20px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--text-secondary); }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { background: var(--card-bg); color: var(--text-primary); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
  .tab.active { background: var(--stirr-red); }
  .tab:hover:not(.active) { background: var(--card-hover); }

  .subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 14px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

  .card { background: var(--card-bg); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; }
  .card:hover { background: var(--card-hover); transform: scale(1.02); box-shadow: 0 4px 20px rgba(232,57,42,0.13); border-color: rgba(232,57,42,0.27); }

  .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .card-icon { width: 44px; height: 44px; border-radius: 10px; background: #2a2a4a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; font-weight: 800; color: var(--stirr-red); }
  .card-icon.news { background: #1a2a3a; color: #4a9eff; }
  .card-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; margin-bottom: 8px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { background: #2a2a4a; color: var(--text-secondary); font-size: 11px; padding: 3px 8px; border-radius: 6px; text-transform: capitalize; }

  .live-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--stirr-red); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: pulse 1.5s ease-in-out infinite; }

  .back-btn { background: none; border: 1px solid rgba(160,160,176,0.27); color: var(--text-primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: border-color 0.2s; }
  .back-btn:hover { border-color: var(--text-secondary); }

  .player-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .player-title { font-size: 22px; font-weight: 700; }
  .player-desc { color: var(--text-secondary); font-size: 14px; margin-top: 12px; line-height: 1.5; }

  .video-wrap { position: relative; border-radius: 12px; overflow: hidden; background: #000; }
  .video-wrap video { width: 100%; display: block; }
  .video-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 2; min-height: 300px; }
  .video-loading-text { color: var(--text-secondary); font-size: 16px; margin-bottom: 6px; }
  .video-loading-sub { color: var(--text-secondary); font-size: 12px; }
  .video-error { padding: 32px; text-align: center; background: var(--card-bg); border-radius: 12px; border: 1px solid #333; }
  .video-error-msg { color: #ff6b6b; font-size: 16px; margin-bottom: 12px; }
  .video-error a { color: var(--stirr-yellow); font-size: 13px; }

  .footer { margin-top: 24px; padding: 16px; background: var(--card-bg); border-radius: 12px; border-left: 3px solid var(--stirr-yellow); font-size: 13px; color: var(--text-secondary); }
  .footer strong { color: var(--stirr-red); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">STIRR</div>
  <div>
    <div class="header-title">Discover</div>
    <div class="header-sub">Live channels from around the world</div>
  </div>
</div>

<div id="tabs-container" class="tabs"></div>
<div id="subtitle" class="subtitle"></div>
<div id="content"></div>
<div id="footer-container"></div>

<script>
const CHANNELS = [
  { id: "BBCNews.uk", name: "BBC News", country: "GB", categories: ["news"], stream: "https://vs-hls-push-ww-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_news_channel_hd/mobile_wifi_main_sd_abr_v2.m3u8", isLive: true, description: "BBC News — 24-hour breaking news and analysis" },
  { id: "BBCOne.uk", name: "BBC One", country: "GB", categories: ["general"], stream: "https://vs-hls-pushb-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_one_hd/pc_hd_abr_v2.m3u8", isLive: true, description: "BBC's flagship channel — drama, entertainment, news" },
  { id: "BBCTwo.uk", name: "BBC Two", country: "GB", categories: ["general"], stream: "https://vs-hls-pushb-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_two_hd/pc_hd_abr_v2.m3u8", isLive: true, description: "BBC Two — documentaries, culture, comedy" },
  { id: "BBCFour.uk", name: "BBC Four", country: "GB", categories: ["general"], stream: "https://vs-hls-pushb-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_four_hd/mobile_wifi_main_hd_abr_v2.m3u8", isLive: true, description: "BBC Four — arts, music, documentaries, international film" },
  { id: "BBCArabic.uk", name: "BBC Arabic", country: "GB", categories: ["news"], stream: "https://vs-hls-pushb-ww-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_arabic_tv/mobile_wifi_main_hd_abr_v2.m3u8", isLive: true, description: "BBC Arabic Television — news for the Middle East & North Africa" },
  { id: "BBCPersian.uk", name: "BBC Persian", country: "GB", categories: ["news"], stream: "https://vs-hls-pushb-ww-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_persian_tv/mobile_wifi_main_hd_abr_v2.m3u8", isLive: true, description: "BBC Persian — Farsi-language news from the BBC" },
  { id: "BBCFood.uk", name: "BBC Food", country: "GB", categories: ["lifestyle"], stream: "https://d1e9r0b71zfwk7.cloudfront.net/playlist.m3u8", isLive: true, description: "BBC Food — recipes, cooking shows, food culture" },
  { id: "BBCHomeGarden.uk", name: "BBC Home & Garden", country: "GB", categories: ["lifestyle"], stream: "https://d11r33s5i066xh.cloudfront.net/playlist.m3u8", isLive: true, description: "BBC Home & Garden — interiors, gardening, DIY" },
  { id: "BBCKids.uk", name: "BBC Kids", country: "GB", categories: ["kids"], stream: "https://dmr1h4skdal9h.cloudfront.net/playlist.m3u8", isLive: true, description: "BBC Kids — children's programming from the BBC" },
  { id: "BBCNewsHD.uk", name: "BBC News HD", country: "GB", categories: ["news"], stream: "https://vs-hls-push-ww-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_news_channel_hd/mobile_wifi_main_hd_abr_v2.m3u8", isLive: true, description: "BBC News in HD — 720p live stream" },
];

const STIRR_STATIONS = [
  { id: "KOMO", callSign: "KOMO", name: "KOMO", market: "Seattle, WA", dma: "Seattle-Tacoma", group: "Sinclair", stream: "https://amg01058-amg01058c5-stirr-us-10184.playouts.now.amagi.tv/playlistR720p.m3u8", isLive: true, categories: ["news","local"], description: "ABC affiliate — Seattle news, weather, traffic" },
  { id: "WJLA", callSign: "WJLA", name: "WJLA", market: "Washington, D.C.", dma: "Washington DC", group: "Sinclair", stream: "https://amg01066-amg01066c5-stirr-us-10184.playouts.now.amagi.tv/playlistR720p.m3u8", isLive: true, categories: ["news","local"], description: "ABC affiliate — DC metro news coverage" },
  { id: "WNYT", callSign: "WNYT", name: "WNYT", market: "Albany, NY", dma: "Albany", group: "Hubbard", stream: "https://amg01942-amg01942c5-stirr-us-10184.playouts.now.amagi.tv/playlistR720p.m3u8", isLive: true, categories: ["news","local"], description: "NBC affiliate — Capital Region news" },
  { id: "KSTP", callSign: "KSTP", name: "KSTP", market: "Minneapolis, MN", dma: "Minneapolis-St Paul", group: "Hubbard", stream: "https://amg01070-amg01070c5-stirr-us-10184.playouts.now.amagi.tv/playlistR720p.m3u8", isLive: true, categories: ["news","local"], description: "ABC affiliate — Twin Cities news" },
  { id: "KSAT", callSign: "KSAT", name: "KSAT", market: "San Antonio, TX", dma: "San Antonio", group: "Graham", stream: "https://amg01060-amg01060c5-stirr-us-10184.playouts.now.amagi.tv/playlistR720p.m3u8", isLive: true, categories: ["news","local"], description: "ABC affiliate — San Antonio news" },
  { id: "WBFF", callSign: "WBFF", name: "WBFF", market: "Baltimore, MD", dma: "Baltimore", group: "Sinclair", stream: "https://amg01054-amg01054c5-stirr-us-10184.playouts.now.amagi.tv/playlistR720p.m3u8", isLive: true, categories: ["news","local"], description: "FOX 45 — Baltimore news and sports" },
];

// HLS proxy running on stirr-a2ui local server — bypasses CORS for Amagi/BBC CDNs
const HLS_PROXY = "http://localhost:10002/hls-proxy";
function proxyUrl(src) { return HLS_PROXY + "?url=" + encodeURIComponent(src); }

let currentTab = "bbc";
let currentHls = null;

function liveBadgeHtml() {
  return `<span class="live-badge"><span class="live-dot"></span>Live</span>`;
}

function initials(name) {
  return name.split(" ").map(w => w[0]).join("").slice(0, 2);
}

function renderTabs() {
  const tabs = [
    { key: "bbc", label: "BBC Channels" },
    { key: "local", label: "STIRR Local News" },
  ];
  document.getElementById("tabs-container").innerHTML = tabs.map(t =>
    `<button class="tab ${currentTab === t.key ? 'active' : ''}" onclick="switchTab('${t.key}')">${t.label}</button>`
  ).join("");
}

function switchTab(key) {
  currentTab = key;
  destroyPlayer();
  renderTabs();
  renderGrid();
}

function renderGrid() {
  const channels = currentTab === "bbc" ? CHANNELS : STIRR_STATIONS;
  const sub = currentTab === "bbc"
    ? "Live BBC streams from stirr-iptv-feeds · Click any channel to play inline"
    : "STIRR local news via Amagi HLS · Click any station to play inline";

  document.getElementById("subtitle").textContent = sub;
  document.getElementById("content").innerHTML = `<div class="grid">${channels.map((ch, i) =>
    `<div class="card" onclick="playChannel('${currentTab}', ${i})">
      <div class="card-top">
        <div class="card-icon ${ch.categories.includes('news') ? 'news' : ''}">${ch.callSign || initials(ch.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${ch.callSign ? ch.callSign + ' — ' + ch.market : ch.name}</div>
          <div class="card-meta">${ch.callSign ? ch.dma + ' · ' + ch.group : ch.country}</div>
        </div>
        ${ch.isLive ? liveBadgeHtml() : ''}
      </div>
      <div class="card-desc">${ch.description}</div>
      <div class="card-tags">${(ch.categories || []).map(c => `<span class="tag">${c}</span>`).join('')}</div>
    </div>`
  ).join('')}</div>`;

  document.getElementById("footer-container").innerHTML =
    `<div class="footer">Powered by <strong>STIRR</strong> + iptv-org community database · ${CHANNELS.length} BBC streams · ${STIRR_STATIONS.length} local stations</div>`;
}

function destroyPlayer() {
  if (currentHls) { currentHls.destroy(); currentHls = null; }
}

function playChannel(tab, index) {
  const channels = tab === "bbc" ? CHANNELS : STIRR_STATIONS;
  const ch = channels[index];
  if (!ch) return;

  destroyPlayer();

  const title = ch.callSign ? `${ch.callSign} — ${ch.market}` : ch.name;

  document.getElementById("tabs-container").innerHTML = "";
  document.getElementById("subtitle").textContent = "";
  document.getElementById("footer-container").innerHTML = "";
  document.getElementById("content").innerHTML = `
    <button class="back-btn" onclick="backToGrid()"><span style="font-size:16px">&#8592;</span> Back to channels</button>
    <div class="player-header">
      <span class="player-title">${title}</span>
      ${ch.isLive ? liveBadgeHtml() : ''}
    </div>
    <div id="player-status" style="color:var(--text-secondary);font-size:12px;margin-bottom:8px;"></div>
    <div class="video-wrap" id="video-wrap">
      <div class="video-loading" id="video-loading">
        <div class="video-loading-text">Connecting to stream...</div>
        <div class="video-loading-sub">Loading HLS manifest</div>
      </div>
      <video id="player-video" controls playsinline style="width:100%;display:block;min-height:300px;" crossorigin="anonymous"></video>
    </div>
    <p class="player-desc">${ch.description}</p>
  `;

  startPlayer(ch.stream);
}

function setStatus(msg) {
  var el = document.getElementById("player-status");
  if (el) el.textContent = msg;
}

function showPlayerError(src) {
  var wrap = document.getElementById("video-wrap");
  if (!wrap) return;
  wrap.innerHTML = '<div class="video-error">' +
    '<div class="video-error-msg">Stream unavailable</div>' +
    '<p style="color:var(--text-secondary);font-size:13px;margin-bottom:10px;">Make sure stirr-a2ui is running: <code>uv run python run_server.py --query-only</code></p>' +
    '<a href="' + src + '" target="_blank" style="color:var(--stirr-yellow);font-size:13px;">Open stream directly &#8599;</a>' +
    '</div>';
}

function startPlayer(src) {
  // Route through the local HLS proxy to bypass CORS
  // The proxy on localhost:10002 fetches the m3u8 and .ts segments,
  // rewrites relative URLs, and serves with CORS headers.
  var proxied = proxyUrl(src);

  var video = document.getElementById("player-video");
  var loadingEl = document.getElementById("video-loading");

  setStatus("Connecting via HLS proxy (localhost:10002)...");

  if (Hls.isSupported()) {
    var hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      enableWorker: false,
    });
    currentHls = hls;
    hls.loadSource(proxied);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      setStatus("Playing via HLS proxy");
      if (loadingEl) loadingEl.style.display = "none";
      video.play().catch(function(){});
    });

    hls.on(Hls.Events.ERROR, function(event, data) {
      if (data.fatal) {
        setStatus("Proxy playback failed — is stirr-a2ui running on :10002?");
        showPlayerError(src);
      }
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    // Safari native — can use direct URL (no CORS issue)
    setStatus("Playing natively (Safari)");
    video.src = src;
    video.addEventListener("loadedmetadata", function() {
      if (loadingEl) loadingEl.style.display = "none";
    });
    video.play().catch(function(){});
  } else {
    showPlayerError(src);
  }
}

function backToGrid() {
  destroyPlayer();
  renderTabs();
  renderGrid();
}

// Init
renderTabs();
renderGrid();
</script>
</body>
</html>
